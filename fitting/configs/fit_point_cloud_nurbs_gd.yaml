# GD vs CCO 对比实验 — 多实例版
task_type: '3d'
run_id: 25                                   # 不排除已覆盖点，靠 overlap 分离
data_file: '/home/m25lll/code/Fiting/fitting/datasets/nurbs/00873042_lessp.ply'

model:
  type: 'nurbs_surface'
  num_ctrl_u: 4
  num_ctrl_v: 4
  degree_u: 3
  degree_v: 3
  sample_u: 45
  sample_v: 45
  weight_lb: 0.8
  weight_ub: 1.2

device:
  train_device: 'cuda:0'
  cuda_deterministic: true
seeds:
  - 65036
  - 98754
  - 8617
  - 45169
  - 29448
  - 80323
  - 17319
  - 98776
  - 79697

estimator:
  type: 'gd'
  horizontal_type: 'Circle'
  vertical_type: 'Parabola'
  data_resolution: 0.01
  model_resolution: 0.004
  early_rejection: false
  regularization_factor: 1.2
  incremental_coverage: true                  # 多实例：只对新覆盖点计数
  overlap_penalty_factor: 2.0
  outlier_distance_factor: 2.5
  outlier_penalty_factor: 3.0
  bbox_margin_factor: 1.0
  bbox_penalty_factor: 2.0
  control_smoothness_penalty_factor: 1.5
  open3d_version: 'legacy'

fitter:
  algo_name: 'gd'
  num_instances: 8
  max_episode: 20000

  # ---- 训练控制 ----
  gd_lr: 0.01
  gd_lr_min_factor: 0.05
  gd_eval_interval: 200
  gd_data_batch_size: 0

  # ---- loss 权重 ----
  gd_data_to_model_weight: 1.0
  gd_model_to_data_weight: 1.0
  gd_coverage_weight: 0.3
  gd_coverage_threshold_factor: 2.5
  gd_coverage_temperature_factor: 0.5
  gd_smoothness_weight: 0.1
  gd_bbox_weight: 0.2
  gd_weight_reg_weight: 0.01
  gd_overlap_weight: 0.2                     # 适中惩罚，靠 overlap 而非数据排除来分离实例
  gd_overlap_margin_factor: 2.0              # 重叠阈值 2.0×0.01=0.02
  gd_exclude_covered: false                  # 不排除已覆盖点，让每个实例都能看到完整数据

collector:
  name: 'hybrid'
  num_episodes_per_rollout: 1
  num_rollouts: 1
  parallel: false
  context: 'spawn'
  reinforcement_episode_size: 1
  evaluation_episode_size: 1

record:
  pulse_size: 2000
  visualization: null
  use_thread_time: false
  verbose: true
  trim_final_mesh: true
  trim_distance_factor: 2.5
  trim_bbox_margin_factor: 1.0
  uv_trim_final_mesh: true
  uv_trim_distance_factor: 2.5
  uv_trim_bbox_margin_factor: 1.0
  uv_trim_edge_factor: 4.0
