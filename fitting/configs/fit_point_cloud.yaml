# ===== 实验基础信息 =====
task_type: '3d'             # 通用 3D 点云拟合入口
run_id: 1
# 替换为你要测试的 PLY 点云文件路径
# 也可以通过命令行覆盖: --data-file /abs/path/to/input.ply
data_file: '/home/m25lll/code/nurbsfit/data/input/00873042_lessp/00873042_lessp.ply'

model:
  type: 'surface'           # 可选: curve, surface；surface 当前使用 rectangle_rule

# ===== 硬件与随机种子 =====
device:
  train_device: 'cuda:0' #'cuda:0'  #cuda:0
  cuda_deterministic: true
seeds: null

# ===== 评估器设置 =====
estimator:
  type: 'npre'              # 可选项: npre, mm
  horizontal_type: 'Circle' # 仅 curve 模型使用: Line, Circle, Spiral
  vertical_type: 'Parabola' # 仅 curve 模型使用: Line, Parabola
  data_resolution: 0.2      # 输入点云的数据分辨率；可命令行覆盖: --data-resolution
  model_resolution: 0.06    # 模型分辨率；surface/rectangle 也使用这个值控制采样层级
  early_rejection: true
  regularization_factor: 1.0
  open3d_version: 'legacy'

# ===== 核心寻优算法设置 =====
fitter:
  algo_name: 'cco'          # 一键切换算法: cco, cs, ala
  num_instances: 4
  num_envs: 8
  episodes_per_env: 20
  max_episode: 250000
  # 常用覆盖:
  # --num-instances 5 --num-envs 1 --episodes-per-env 6 --max-episode 60

# ===== 采集器设置 =====
collector:
  name: 'hybrid'
  num_episodes_per_rollout: 4
  num_rollouts: 2
  parallel: true
  context: 'spawn'
  reinforcement_episode_size: 30
  evaluation_episode_size: 10

# ===== 日志与可视化 =====
record:
  pulse_size: 2000
  visualization: 'parallel'
  use_thread_time: false
  verbose: true
  # 关闭可视化可用: --visualization none
