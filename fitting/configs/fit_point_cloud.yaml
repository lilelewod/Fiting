# ===== 实验基础信息 =====
task_type: '3d'             # 通用 3D 点云拟合入口
run_id: 1
# 替换为你要测试的 PLY 点云文件路径
# 也可以通过命令行覆盖: --data-file /abs/path/to/input.ply
data_file: 'datasets/surface/cloud1.ply'

model:
  # 可选: curve, surface, nurbs_surface
  type: 'nurbs_surface'
  # NURBS 控制点网格大小（u 方向）
  num_ctrl_u: 6
  # NURBS 控制点网格大小（v 方向）
  num_ctrl_v: 6
  # NURBS 次数（u 方向）
  degree_u: 3
  # NURBS 次数（v 方向）
  degree_v: 3
  # NURBS 采样分辨率（u 方向）
  sample_u: 25
  # NURBS 采样分辨率（v 方向）
  sample_v: 25
  # NURBS 权重下界
  weight_lb: 0.3
  # NURBS 权重上界
  weight_ub: 3.0

# ===== 硬件与随机种子 =====
device:
  train_device: 'cuda:0'  #cuda:0
  cuda_deterministic: true
seeds: null

# ===== 评估器设置 =====
estimator:
  type: 'npre'              # 可选项: npre, mm
  horizontal_type: 'Circle' # 仅 curve 模型使用: Line, Circle, Spiral
  vertical_type: 'Parabola' # 仅 curve 模型使用: Line, Parabola
  data_resolution: 0.01     # 输入点云的数据分辨率；可命令行覆盖: --data-resolution
  model_resolution: 0.003   # 模型分辨率；surface/rectangle 也使用这个值控制采样层级
  early_rejection: true
  regularization_factor: 1.0
  open3d_version: 'legacy'

# ===== 核心寻优算法设置 =====
fitter:
  algo_name: 'cco'          # 一键切换算法: cco, cs, ala
  num_instances: 5          # 多实例拟合：顺序拟合 5 张 NURBS patch
  num_envs: 4
  episodes_per_env: 8
  max_episode: 20000
  # 常用覆盖:
  # --num-instances 5 --num-envs 1 --episodes-per-env 6 --max-episode 60

# ===== 采集器设置 =====
collector:
  name: 'hybrid'
  num_episodes_per_rollout: 4
  num_rollouts: 2
  parallel: true
  context: 'spawn'
  reinforcement_episode_size: 30
  evaluation_episode_size: 10

# ===== 日志与可视化 =====
record:
  pulse_size: 2000
  visualization: null
  use_thread_time: false
  verbose: true
  # 关闭可视化可用: --visualization none
